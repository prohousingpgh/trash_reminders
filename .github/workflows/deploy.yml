name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-trash-reminders
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check Fly API token
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::Repository secret FLY_API_TOKEN is missing or empty."
            echo "Create one locally: fly tokens create deploy -a trash-reminders"
            echo "Then add it at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a trash-reminders
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
